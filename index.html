<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ICSE Prod">
<meta name="theme-color" content="#0F1117">
<title>ICSE — Producción</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@500&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --g:#1D9E75;--gl:#E1F5EE;--gd:#0F6E56;
  --w:#BA7517;--wl:#FAEEDA;
  --d:#A32D2D;--dl:#FCEBEB;
  --bg:#0F1117;--bg2:#181C25;--bg3:#1E2330;
  --border:#2A2F3E;--border2:#343A4E;
  --txt:#E8EAF0;--txt2:#8B90A4;--txt3:#555B6E;
  --blue:#3B82F6;--blue-l:#1E3A5F;
}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;font-size:15px;overscroll-behavior:none}

/* LOGIN */
.login-screen{
  position:fixed;inset:0;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:32px;z-index:500;
}
.login-logo{
  width:72px;height:72px;border-radius:20px;background:var(--g);
  display:flex;align-items:center;justify-content:center;
  font-size:28px;font-weight:700;color:#fff;font-family:'DM Mono',monospace;
  margin-bottom:20px;
}
.login-screen h2{font-size:20px;font-weight:600;margin-bottom:6px}
.login-screen p{font-size:13px;color:var(--txt2);margin-bottom:32px;text-align:center}
.login-screen input{
  width:100%;max-width:320px;
  background:var(--bg3);border:1px solid var(--border2);border-radius:12px;
  padding:14px 16px;font-size:16px;color:var(--txt);
  font-family:'DM Sans',sans-serif;margin-bottom:12px;outline:none;
}
.login-screen input:focus{border-color:var(--g)}
.role-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:8px;
  width:100%;max-width:320px;margin-bottom:20px;
}
.role-card{
  background:var(--bg3);border:1.5px solid var(--border);border-radius:12px;
  padding:12px;cursor:pointer;transition:all .15s;text-align:center;
}
.role-card.selected{border-color:var(--g);background:#0D2B1F}
.role-card .role-icon{font-size:22px;margin-bottom:4px}
.role-card .role-name{font-size:12px;font-weight:500;color:var(--txt2)}
.role-card.selected .role-name{color:var(--g)}
.login-btn{
  width:100%;max-width:320px;background:var(--g);border:none;border-radius:12px;
  padding:14px;font-size:15px;font-weight:600;color:#fff;
  cursor:pointer;font-family:'DM Sans',sans-serif;
  opacity:.4;transition:opacity .2s;
}
.login-btn.ready{opacity:1}

/* HEADER */
.app-header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;position:sticky;top:0;z-index:100}
.header-top{display:flex;align-items:center;justify-content:space-between;padding:10px 0 8px;gap:10px}
.header-left{display:flex;align-items:center;gap:10px}
.logo{width:36px;height:36px;border-radius:10px;background:var(--g);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;font-family:'DM Mono',monospace;flex-shrink:0}
.header-title h1{font-size:14px;font-weight:600}
.header-title p{font-size:11px;color:var(--txt2);margin-top:1px}
.header-right{display:flex;gap:6px;align-items:center;flex-shrink:0}
.svc-toggle{display:flex;background:var(--bg3);border-radius:20px;padding:3px;gap:2px}
.svc-btn{background:none;border:none;border-radius:16px;padding:4px 10px;font-size:11px;color:var(--txt2);cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;transition:all .2s}
.svc-btn.on{background:var(--g);color:#fff}
.user-badge{background:var(--bg3);border:1px solid var(--border2);border-radius:20px;padding:4px 10px;font-size:11px;color:var(--txt2);cursor:pointer}

/* STATS */
.stats-row{display:flex;gap:6px;padding:8px 0 10px;overflow-x:auto;scrollbar-width:none}
.stats-row::-webkit-scrollbar{display:none}
.stat{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:5px 10px;white-space:nowrap;font-size:11px;color:var(--txt2);flex-shrink:0}
.stat b{font-weight:600;color:var(--txt)}
.stat.gs b{color:var(--g)}
.progress-track{height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-bottom:10px}
.progress-fill{height:100%;background:var(--g);border-radius:2px;transition:width .4s ease;width:0%}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;background:var(--bg2);position:sticky;top:115px;z-index:99}
.tabs::-webkit-scrollbar{display:none}
.tab{background:none;border:none;border-bottom:2px solid transparent;padding:10px 14px;font-size:12px;font-weight:500;color:var(--txt2);cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif;transition:color .2s}
.tab.on{color:var(--g);border-bottom-color:var(--g)}

/* PANES */
.pane{display:none;padding:12px 16px 80px}
.pane.on{display:block}

/* BANNERS */
.bn{border-radius:10px;padding:10px 12px;font-size:12px;line-height:1.6;margin-bottom:12px}
.bn.info{background:#0D2B1F;border:1px solid #1A4D35;color:#5DCAA5}
.bn.warn{background:#2B1E0A;border:1px solid #4D3510;color:#EF9F27}
.bn.danger{background:#2B0F0F;border:1px solid #4D1A1A;color:#F09595}
.bn b{font-weight:600}

/* PHASE */
.phase{border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden}
.ph-head{padding:12px 14px;background:var(--bg3);display:flex;align-items:center;gap:7px;cursor:pointer;user-select:none}
.ph-step{font-size:10px;font-weight:600;background:var(--blue-l);color:var(--blue);border-radius:12px;padding:2px 8px;font-family:'DM Mono',monospace;white-space:nowrap}
.ph-title{font-size:13px;font-weight:600;flex:1;color:var(--txt)}
.badge{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500;white-space:nowrap}
.badge.green{background:#0D2B1F;color:#5DCAA5}
.badge.warn{background:#2B1E0A;color:#EF9F27}
.badge.danger{background:#2B0F0F;color:#F09595}
.badge.blue{background:var(--blue-l);color:var(--blue)}
.ph-prog{font-size:10px;color:var(--txt3);font-family:'DM Mono',monospace;min-width:28px;text-align:right}
.ph-arrow{font-size:10px;color:var(--txt3);transition:transform .2s;margin-left:2px}
.phase.open .ph-arrow{transform:rotate(180deg)}
.ph-body{display:none;border-top:1px solid var(--border)}
.phase.open .ph-body{display:block}

/* ITEMS */
.item{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;-webkit-user-select:none;user-select:none;position:relative}
.item:last-child{border-bottom:none}
.item:active{background:var(--bg3)}
.item.ck .ilabel{text-decoration:line-through;color:var(--txt3)}
.item.ck .isub{color:var(--txt3)}
.checkbox{width:22px;height:22px;min-width:22px;border:1.5px solid var(--border2);border-radius:6px;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.item.ck .checkbox{background:var(--g);border-color:var(--g)}
.checkmark{font-size:13px;color:#fff;display:none}
.item.ck .checkmark{display:block}
.itext{flex:1;min-width:0}
.ilabel{font-size:18px;line-height:1.5;color:var(--txt);transition:color .15s}
.isub{font-size:14px;color:var(--txt2);margin-top:4px;line-height:1.5;transition:color .15s}
.itags{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px;align-items:center}
.rtag{font-size:11px;padding:3px 8px;border-radius:5px;font-weight:500}
.rs{background:#1E3A5F;color:#93C5FD}
.rv{background:#2D1B69;color:#C4B5FD}
.rl{background:#2B1E0A;color:#FCD34D}
.rp{background:#0D2B1F;color:#6EE7B7}
.rd{background:#2B0F0F;color:#FCA5A5}
.ra{background:var(--bg3);color:var(--txt2)}
.etag{font-size:11px;padding:3px 8px;border-radius:5px;background:var(--bg3);color:var(--txt3);border:1px solid var(--border)}

/* WHO CHECKED */
.who-checked{font-size:10px;color:var(--txt3);margin-top:4px;font-style:italic}

/* ONLINE INDICATOR */
.online-dot{width:7px;height:7px;border-radius:50%;background:var(--g);display:inline-block;margin-right:4px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* USERS ONLINE */
.online-bar{display:flex;gap:6px;padding:6px 0 10px;flex-wrap:wrap}
.online-pill{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--txt2);display:flex;align-items:center;gap:5px}

/* FAB */
.fab{position:fixed;bottom:24px;right:20px;width:50px;height:50px;border-radius:50%;background:var(--bg2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,.5);font-size:20px;z-index:200;transition:transform .15s}
.fab:active{transform:scale(.92)}

/* TOAST */
.toast{position:fixed;bottom:86px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--bg2);border:1px solid var(--border2);color:var(--txt);padding:10px 18px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;z-index:300;max-width:90vw;overflow:hidden;text-overflow:ellipsis}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.success{background:#0D2B1F;border-color:#1A4D35;color:#5DCAA5}
</style>
</head>

<!-- MAIN APP -->
<div id="mainApp" style="display:none">
<div class="app-header">
  <div class="header-top">
    <div class="header-left">
      <div class="logo">IC</div>

    <div class="header-right">
      <div class="svc-toggle">
        <button class="svc-btn on" onclick="setSvc('d',this)">Dom</button>
        <button class="svc-btn" onclick="setSvc('m',this)">Mié</button>
      </div>
      <div class="user-badge" onclick="logout()">Salir</div>
    </div>
  </div>
  <div class="online-bar" id="onlineBar"></div>
  <div class="stats-row">
    <div class="stat">Total: <b id="st">0</b></div>
    <div class="stat gs">Listos: <b id="sd">0</b></div>
    <div class="stat">Restantes: <b id="sr">0</b></div>
    <div class="stat">Progreso: <b id="sp">0%</b></div>
  </div>
  <div class="progress-track"><div class="progress-fill" id="pbar"></div></div>
</div>

<div class="tabs">
  <button class="tab on" onclick="setTab('t1',this)">🔌 Encendido</button>
  <button class="tab" onclick="setTab('t2',this)">⚙️ Pre-servicio</button>
  <button class="tab" onclick="setTab('t3',this)">▶ Servicio</button>
  <button class="tab" onclick="setTab('t4',this)">⏹ Cierre</button>
</div>

<div id="t1" class="pane on"></div>
<div id="t2" class="pane"></div>
<div id="t3" class="pane"></div>
<div id="t4" class="pane"></div>
</div>

<div class="fab" onclick="confirmReset()">↺</div>
<div class="toast" id="toast"></div>

// State
let userName = '', userRole = '', userIcon = '';
let checkedData = {};
let selectedRole = null;

// Firebase refs
const checklistRef = ref(db, 'checklist');
const usersRef = ref(db, 'users');

// LOGIN
window.selectRole = function(role, icon) {
  selectedRole = {role, icon};
  document.querySelectorAll('.role-card').forEach(c => c.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
  checkLogin();
};

window.checkLogin = function() {
  const name = document.getElementById('nameInput').value.trim();
  const btn = document.getElementById('loginBtn');
  btn.classList.toggle('ready', name.length > 0 && selectedRole);
};

window.doLogin = function() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name || !selectedRole) return;
  userName = name;
  userRole = selectedRole.role;
  userIcon = selectedRole.icon;
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainApp').style.display = 'block';
  document.getElementById('userLabel').textContent = `${userIcon} ${userName} — ${userRole}`;

  // Register user online
  const userRef = ref(db, `users/${userName}`);
  set(userRef, { name: userName, role: userRole, icon: userIcon, online: true, ts: Date.now() });

  // Remove on disconnect handled by listening
  startApp();
};

window.logout = function() {
  if (!confirm('¿Salir del checklist?')) return;
  const userRef = ref(db, `users/${userName}`);
  remove(userRef);
  location.reload();
};

function startApp() {
  buildPanes();

  // Listen to checklist changes in real time
  onValue(checklistRef, (snapshot) => {
    checkedData = snapshot.val() || {};
    refreshUI();
  });

  // Listen to online users
  onValue(usersRef, (snapshot) => {
    const users = snapshot.val() || {};
    renderOnlineUsers(users);
  });
}

function renderOnlineUsers(users) {
  const bar = document.getElementById('onlineBar');
  const list = Object.values(users);
  if (list.length === 0) { bar.innerHTML = ''; return; }
  bar.innerHTML = list.map(u =>
    `<div class="online-pill"><span class="online-dot"></span>${u.icon} ${u.name}</div>`
  ).join('');
}

// TOGGLE
window.toggle = function(id) {
  const itemRef = ref(db, `checklist/${id}`);
  if (checkedData[id]) {
    remove(itemRef);
  } else {
    set(itemRef, { by: userName, role: userRole, icon: userIcon, ts: Date.now() });
  }
};

function refreshUI() {
  const all = allItems();
  const done = all.filter(i => checkedData[i.id]).length;
  document.getElementById('st').textContent = all.length;
  document.getElementById('sd').textContent = done;
  document.getElementById('sr').textContent = all.length - done;
  const pct = Math.round(done / all.length * 100);
  document.getElementById('sp').textContent = pct + '%';
  document.getElementById('pbar').style.width = pct + '%';

  all.forEach(it => {
    const el = document.getElementById('i-' + it.id);
    if (!el) return;
    const data = checkedData[it.id];
    el.classList.toggle('ck', !!data);
    const who = el.querySelector('.who-checked');
    if (who) who.textContent = data ? `✓ ${data.icon} ${data.by}` : '';
  });

  // Update phase progress
  Object.values(PHASES).forEach(phases => phases.forEach(ph => {
    const done = ph.items.filter(i => checkedData[i.id]).length;
    const el = document.getElementById('pp-' + ph.id);
    if (el) el.textContent = done + '/' + ph.items.length;
  }));
}

function allItems() {
  let a = [];
  Object.values(PHASES).forEach(ps => ps.forEach(ph => ph.items.forEach(it => a.push(it))));
  return a;
}

window.togglePhase = function(id) {
  const ph = document.getElementById('ph-' + id);
  if (ph) ph.classList.toggle('open');
};

window.setTab = function(t, btn) {
  document.querySelectorAll('.pane').forEach(p => p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('on'));
  document.getElementById(t).classList.add('on');
  if (btn) btn.classList.add('on');
};

window.setSvc = function(s, btn) {
  document.querySelectorAll('.svc-btn').forEach(b => b.classList.remove('on'));
  if (btn) btn.classList.add('on');
  const n = document.getElementById('svc-note');
  if (n) n.style.display = (s === 'm') ? 'block' : 'none';
};

window.confirmReset = function() {
  if (!confirm('¿Reiniciar TODO el checklist para todos?\nEsto afecta a todo el equipo.')) return;
  set(checklistRef, null);
  showToast('Checklist reiniciado para todos');
};

let toastTimer;
window.showToast = function(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
};

function buildPanes() {
  const banners = {
    t1: `<div class="bn info"><b>Orden de encendido:</b> 1. Mac ProPresenter → 2. Confidence monitor → 3. LED principal → 4. Rack de video → 5. Mac Lightkey + luces → 6. PC ATEM Software → 7. Abrir ProPresenter → 8. TVs de respaldo → 9. X32 + Rack de power + Amp/PA → 10. Cámaras → 11. Streaming (Restream)</div>`,
    t2: `<div class="bn warn" id="svc-note" style="display:none"><b>Miércoles:</b> Formato más reducido. Ajusta según el programa del día.</div>`,
    t4: `<div class="bn danger"><b>Orden de apagado:</b> Faders X32 → Amp/PA (PRIMERO) → Rack de power → X32 (ÚLTIMA) → GoPros → URSA → Cerrar ProPresenter → Confidence monitor → TVs → LED screens → Mac → PC ATEM → Rack de video → Humo → Lightkey</div>`,
  };

  Object.entries(PHASES).forEach(([tid, phases]) => {
    const pane = document.getElementById(tid);
    let html = banners[tid] || '';
    phases.forEach(ph => {
      const done = ph.items.filter(i => checkedData[i.id]).length;
      const bc = ph.bc || 'green';
      const st = ph.step ? `<span class="ph-step">P${ph.step}</span>` : '';
      html += `<div class="phase" id="ph-${ph.id}">
        <div class="ph-head" onclick="togglePhase('${ph.id}')">
          ${st}
          <span class="ph-title">${ph.title}</span>
          <span class="badge ${bc}">${ph.badge}</span>
          <span class="ph-prog" id="pp-${ph.id}">${done}/${ph.items.length}</span>
          <span class="ph-arrow">▾</span>
        </div>
        <div class="ph-body">`;
      ph.items.forEach(it => {
        const data = checkedData[it.id];
        const ck = data ? 'ck' : '';
        const eq = it.eq ? `<span class="etag">${it.eq}</span>` : '';
        const whoText = data ? `${data.icon} ${data.by}` : '';
        html += `<div class="item ${ck}" id="i-${it.id}" onclick="toggle('${it.id}')">
          <div class="checkbox"><span class="checkmark">✓</span></div>
          <div class="itext">
            <div class="ilabel">${it.l}</div>
            ${it.s ? `<div class="isub">${it.s}</div>` : ''}
            <div class="itags">
              <span class="rtag ${RT[it.r]}">${RL[it.r]}</span>
              ${eq}
            </div>
            <div class="who-checked">${whoText}</div>
          </div>
        </div>`;
      });
      html += `</div></div>`;
    });
    pane.innerHTML = html;
  });
}
</script>
