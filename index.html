<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ICSE Prod">
<meta name="theme-color" content="#0F1117">
<title>ICSE — Producción</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@500&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --g:#1D9E75;--gl:#E1F5EE;--gd:#0F6E56;
  --w:#BA7517;--wl:#FAEEDA;
  --d:#A32D2D;--dl:#FCEBEB;
  --bg:#0F1117;--bg2:#181C25;--bg3:#1E2330;--bg4:#232840;
  --border:#2A2F3E;--border2:#343A4E;
  --txt:#E8EAF0;--txt2:#8B90A4;--txt3:#555B6E;
  --blue:#3B82F6;--blue-l:#1E3A5F;
}
html,body{min-height:100%;background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;font-size:15px;overscroll-behavior:none}

/* ─── SCREENS ─── */
.screen{display:none;min-height:100vh}
.screen.on{display:block}

/* ─── LOGIN ─── */
#loginScreen{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;padding:32px 24px;background:var(--bg);
}
.login-logo{
  width:80px;height:80px;border-radius:22px;background:var(--g);
  display:flex;align-items:center;justify-content:center;
  font-size:32px;font-weight:700;color:#fff;font-family:'DM Mono',monospace;
  margin-bottom:20px;
}
#loginScreen h2{font-size:22px;font-weight:600;margin-bottom:6px;text-align:center}
#loginScreen p{font-size:13px;color:var(--txt2);margin-bottom:28px;text-align:center;line-height:1.5}
#loginScreen input{
  width:100%;max-width:340px;background:var(--bg3);border:1.5px solid var(--border2);
  border-radius:14px;padding:15px 16px;font-size:16px;color:var(--txt);
  font-family:'DM Sans',sans-serif;margin-bottom:16px;outline:none;transition:border .2s;
}
#loginScreen input:focus{border-color:var(--g)}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;max-width:340px;margin-bottom:24px}
.role-card{
  background:var(--bg3);border:1.5px solid var(--border);border-radius:14px;
  padding:14px 10px;cursor:pointer;transition:all .15s;text-align:center;
}
.role-card.selected{border-color:var(--g);background:#0D2B1F}
.role-card .ri{font-size:24px;margin-bottom:5px}
.role-card .rn{font-size:12px;font-weight:500;color:var(--txt2)}
.role-card.selected .rn{color:var(--g)}
.login-btn{
  width:100%;max-width:340px;background:var(--g);border:none;border-radius:14px;
  padding:16px;font-size:15px;font-weight:600;color:#fff;cursor:pointer;
  font-family:'DM Sans',sans-serif;opacity:.35;transition:opacity .2s;
}
.login-btn.ready{opacity:1}

/* ─── HEADER ─── */
.app-header{
  background:var(--bg2);border-bottom:1px solid var(--border);
  padding:0 16px;position:sticky;top:0;z-index:100;
}
.header-top{display:flex;align-items:center;justify-content:space-between;padding:11px 0 8px;gap:10px}
.header-left{display:flex;align-items:center;gap:10px}
.h-logo{
  width:36px;height:36px;border-radius:10px;background:var(--g);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;color:#fff;font-family:'DM Mono',monospace;flex-shrink:0;
}
.h-title{font-size:14px;font-weight:600}
.h-sub{font-size:11px;color:var(--txt2);margin-top:1px}
.header-right{display:flex;gap:6px;align-items:center;flex-shrink:0}
.svc-toggle{display:flex;background:var(--bg3);border-radius:20px;padding:3px;gap:2px}
.svc-btn{background:none;border:none;border-radius:16px;padding:4px 10px;font-size:11px;color:var(--txt2);cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;transition:all .2s}
.svc-btn.on{background:var(--g);color:#fff}
.logout-btn{background:none;border:1px solid var(--border2);border-radius:20px;padding:4px 10px;font-size:11px;color:var(--txt2);cursor:pointer;font-family:'DM Sans',sans-serif}

/* ONLINE BAR */
.online-bar{display:flex;gap:6px;padding:6px 0 8px;flex-wrap:wrap;min-height:32px}
.online-pill{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--txt2);display:flex;align-items:center;gap:5px}
.odot{width:6px;height:6px;border-radius:50%;background:var(--g);animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* GLOBAL PROGRESS */
.global-prog{padding:0 0 10px}
.gp-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.gp-label{font-size:11px;color:var(--txt2)}
.gp-pct{font-size:12px;font-weight:600;color:var(--g);font-family:'DM Mono',monospace}
.gp-track{height:4px;background:var(--bg3);border-radius:3px;overflow:hidden}
.gp-fill{height:100%;background:var(--g);border-radius:3px;transition:width .4s ease;width:0%}

/* ─── TABS ─── */
.tabs{display:flex;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;background:var(--bg2);position:sticky;top:120px;z-index:99}
.tabs::-webkit-scrollbar{display:none}
.tab{background:none;border:none;border-bottom:2px solid transparent;padding:10px 14px;font-size:12px;font-weight:500;color:var(--txt2);cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif;transition:color .2s}
.tab.on{color:var(--g);border-bottom-color:var(--g)}

/* ─── PANES ─── */
.pane{display:none;padding:14px 16px 90px}
.pane.on{display:block}

/* BANNER */
.bn{border-radius:10px;padding:10px 12px;font-size:12px;line-height:1.6;margin-bottom:14px}
.bn.info{background:#0D2B1F;border:1px solid #1A4D35;color:#5DCAA5}
.bn.warn{background:#2B1E0A;border:1px solid #4D3510;color:#EF9F27}
.bn.danger{background:#2B0F0F;border:1px solid #4D1A1A;color:#F09595}
.bn b{font-weight:600}

/* ─── RUBRO BUTTON ─── */
.rubro-btn{
  background:var(--bg2);border:1px solid var(--border);border-radius:14px;
  margin-bottom:10px;overflow:hidden;transition:border-color .2s;cursor:pointer;
}
.rubro-btn.open{border-color:var(--border2)}
.rubro-head{
  display:flex;align-items:center;gap:12px;padding:14px 16px;
  user-select:none;
}
.rubro-icon{
  width:42px;height:42px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;
}
.rubro-icon.green{background:#0D2B1F}
.rubro-icon.blue{background:var(--blue-l)}
.rubro-icon.warn{background:#2B1E0A}
.rubro-icon.danger{background:#2B0F0F}
.rubro-info{flex:1;min-width:0}
.rubro-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:5px}
.rubro-name{font-size:15px;font-weight:600;color:var(--txt)}
.rubro-count{font-size:11px;font-family:'DM Mono',monospace;color:var(--txt3);flex-shrink:0}
.rubro-track{height:4px;background:var(--bg3);border-radius:3px;overflow:hidden}
.rubro-fill{height:100%;border-radius:3px;transition:width .4s ease;width:0%}
.rubro-fill.green{background:var(--g)}
.rubro-fill.blue{background:var(--blue)}
.rubro-fill.warn{background:var(--w)}
.rubro-fill.danger{background:var(--d)}
.rubro-arrow{font-size:12px;color:var(--txt3);transition:transform .25s;flex-shrink:0}
.rubro-btn.open .rubro-arrow{transform:rotate(180deg)}

/* ─── PHASE INSIDE RUBRO ─── */
.rubro-body{display:none;border-top:1px solid var(--border)}
.rubro-btn.open .rubro-body{display:block}

.phase-group{border-bottom:1px solid var(--border)}
.phase-group:last-child{border-bottom:none}
.ph-label{
  padding:10px 16px 6px;font-size:11px;font-weight:600;
  color:var(--txt3);letter-spacing:.05em;text-transform:uppercase;
  display:flex;align-items:center;gap:8px;
}
.ph-step-tag{
  background:var(--blue-l);color:var(--blue);
  border-radius:10px;padding:1px 7px;font-size:10px;
  font-family:'DM Mono',monospace;text-transform:none;letter-spacing:0;
}

/* ─── ITEM ─── */
.item{
  display:flex;align-items:flex-start;gap:12px;
  padding:13px 16px;border-bottom:1px solid var(--border);
  cursor:pointer;transition:background .1s;
  -webkit-user-select:none;user-select:none;
}
.item:last-child{border-bottom:none}
.item:active{background:var(--bg3)}
.item.ck .ilabel{text-decoration:line-through;color:var(--txt3)}
.item.ck .isub{color:var(--txt3)}
.checkbox{
  width:24px;height:24px;min-width:24px;border:1.5px solid var(--border2);
  border-radius:7px;margin-top:2px;display:flex;align-items:center;justify-content:center;
  transition:all .15s;flex-shrink:0;
}
.item.ck .checkbox{background:var(--g);border-color:var(--g)}
.checkmark{font-size:14px;color:#fff;display:none}
.item.ck .checkmark{display:block}
.itext{flex:1;min-width:0}
.ilabel{font-size:17px;line-height:1.5;color:var(--txt);transition:color .15s}
.isub{font-size:13px;color:var(--txt2);margin-top:4px;line-height:1.5;transition:color .15s}
.itags{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;align-items:center}
.rtag{font-size:11px;padding:3px 8px;border-radius:5px;font-weight:500}
.rs{background:#1E3A5F;color:#93C5FD}
.rv{background:#2D1B69;color:#C4B5FD}
.rl{background:#2B1E0A;color:#FCD34D}
.rp{background:#0D2B1F;color:#6EE7B7}
.rd{background:#2B0F0F;color:#FCA5A5}
.ra{background:var(--bg3);color:var(--txt2)}
.etag{font-size:11px;padding:3px 8px;border-radius:5px;background:var(--bg3);color:var(--txt3);border:1px solid var(--border)}
.who-tag{font-size:11px;color:var(--g);margin-top:4px;font-weight:500}

/* FAB */
.fab{position:fixed;bottom:24px;right:20px;width:50px;height:50px;border-radius:50%;background:var(--bg2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,.5);font-size:20px;z-index:200;transition:transform .15s}
.fab:active{transform:scale(.92)}

/* TOAST */
.toast{position:fixed;bottom:86px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--bg2);border:1px solid var(--border2);color:var(--txt);padding:10px 18px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;z-index:300}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{background:#0D2B1F;border-color:#1A4D35;color:#5DCAA5}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">

    <div class="role-card" onclick="selectRole('Líder','📋',this)"><div class="ri">📋</div><div class="rn">Líder</div></div>

  </div>
  <button class="login-btn" id="loginBtn" onclick="doLogin()">Entrar al checklist →</button>
</div>

<!-- MAIN APP -->
<div id="mainApp" class="screen">
  <div class="app-header">
    <div class="header-top">
      <div class="header-left">
        <div class="h-logo">IC</div>
        <div>
          <div class="h-title">ICSE Producción</div>
          <div class="h-sub" id="userLabel">—</div>
        </div>
      </div>
      <div class="header-right">
        <div class="svc-toggle">
          <button class="svc-btn on" onclick="setSvc('d',this)">Dom</button>
          <button class="svc-btn" onclick="setSvc('m',this)">Mié</button>

        <button class="logout-btn" onclick="logout()">Salir</button>
      </div>

    <div class="online-bar" id="onlineBar"></div>
    <div class="global-prog">

        <span class="gp-pct" id="gpPct">0%</span>
      </div>
      <div class="gp-track"><div class="gp-fill" id="gpFill"></div></div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab on" onclick="setTab('t1',this)">🔌 Encendido</button>
    <button class="tab" onclick="setTab('t2',this)">⚙️ Pre-servicio</button>
    <button class="tab" onclick="setTab('t3',this)">▶ Servicio</button>
    <button class="tab" onclick="setTab('t4',this)">⏹ Cierre</button>

  <div id="t1" class="pane on"></div>
  <div id="t2" class="pane"></div>
  <div id="t3" class="pane"></div>
  <div id="t4" class="pane"></div>
</div>

<div class="fab" onclick="confirmReset()">↺</div>
<div class="toast" id="toast"></div>

// State
let userName='', userRole='', userIcon='', selRoleData=null;
let checkedData={};

const checklistRef = ref(db,'checklist');
const usersRef = ref(db,'users');

// Flatten all items
function allItems(){
  let a=[];
  Object.values(RUBROS).forEach(rubros=>rubros.forEach(rb=>rb.phases.forEach(ph=>ph.items.forEach(it=>a.push(it)))));
  return a;
}
function allItemsInRubro(rb){ let a=[]; rb.phases.forEach(ph=>ph.items.forEach(it=>a.push(it))); return a; }

// LOGIN
window.selectRole = (role,icon,el) => {
  selRoleData={role,icon};
  document.querySelectorAll('.role-card').forEach(c=>c.classList.remove('selected'));
  el.classList.add('selected');
  checkLogin();
};
window.checkLogin = () => {
  const n=document.getElementById('nameInput').value.trim();
  document.getElementById('loginBtn').classList.toggle('ready', n.length>0 && selRoleData);
};
window.doLogin = () => {
  const n=document.getElementById('nameInput').value.trim();
  if(!n||!selRoleData) return;
  userName=n; userRole=selRoleData.role; userIcon=selRoleData.icon;
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('mainApp').classList.add('on');
  document.getElementById('userLabel').textContent=`${userIcon} ${userName} — ${userRole}`;
  set(ref(db,`users/${userName}`),{name:userName,role:userRole,icon:userIcon,ts:Date.now()});
  startApp();
};
window.logout = () => {
  if(!confirm('¿Salir del checklist?')) return;
  remove(ref(db,`users/${userName}`));
  location.reload();
};

function startApp(){
  buildPanes();
  onValue(checklistRef,snap=>{ checkedData=snap.val()||{}; refreshUI(); });
  onValue(usersRef,snap=>{ renderOnline(snap.val()||{}); });
}

function renderOnline(users){
  const bar=document.getElementById('onlineBar');
  const list=Object.values(users);
  bar.innerHTML=list.length===0?'':list.map(u=>`<div class="online-pill"><span class="odot"></span>${u.icon} ${u.name}</div>`).join('');
}

window.toggle = id => {
  const r=ref(db,`checklist/${id}`);
  if(checkedData[id]) remove(r);
  else set(r,{by:userName,role:userRole,icon:userIcon,ts:Date.now()});
};

function refreshUI(){
  const all=allItems(), done=all.filter(i=>checkedData[i.id]).length;
  const pct=all.length?Math.round(done/all.length*100):0;
  document.getElementById('gpLabel').textContent=`${done} de ${all.length} completados`;
  document.getElementById('gpPct').textContent=pct+'%';
  document.getElementById('gpFill').style.width=pct+'%';

  // Update items
  all.forEach(it=>{
    const el=document.getElementById('i-'+it.id);
    if(!el) return;
    const data=checkedData[it.id];
    el.classList.toggle('ck',!!data);
    const wt=el.querySelector('.who-tag');
    if(wt) wt.textContent=data?`${data.icon} ${data.by}`:'';
  });

  // Update rubro progress bars
  Object.values(RUBROS).forEach(rubros=>rubros.forEach(rb=>{
    const items=allItemsInRubro(rb);
    const d=items.filter(i=>checkedData[i.id]).length;
    const pct=items.length?Math.round(d/items.length*100):0;
    const fill=document.getElementById('rf-'+rb.id);
    const cnt=document.getElementById('rc-'+rb.id);
    if(fill) fill.style.width=pct+'%';
    if(cnt) cnt.textContent=`${d}/${items.length}`;
  }));
}

window.toggleRubro = id => {
  const el=document.getElementById('rb-'+id);
  if(el) el.classList.toggle('open');
};

window.setTab = (t,btn) => {
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  document.getElementById(t).classList.add('on');
  if(btn) btn.classList.add('on');
};

window.setSvc = (s,btn) => {
  document.querySelectorAll('.svc-btn').forEach(b=>b.classList.remove('on'));
  if(btn) btn.classList.add('on');
  const n=document.getElementById('svc-note');
  if(n) n.style.display=(s==='m')?'block':'none';
};

window.confirmReset = () => {
  if(!confirm('¿Reiniciar TODO el checklist para todos?\nEsto afecta a todo el equipo.')) return;
  set(checklistRef,null);
  showToast('Checklist reiniciado para todos ✓','ok');
};

let toastTimer;
window.showToast = (msg,type='') => {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast show'+(type?' '+type:'');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2800);
};

const BANNERS={
  t1:`<div class="bn info"><b>Orden:</b> Mac ProPresenter → Confidence monitor → LED → Rack de video → Lightkey → PC ATEM → Abrir ProPresenter → TVs respaldo → X32 + Rack + Amp → Cámaras → Restream</div>`,
  t2:`<div class="bn warn" id="svc-note" style="display:none"><b>Miércoles:</b> Formato más reducido. Ajusta según el programa.</div>`,
  t4:`<div class="bn danger"><b>Apagado:</b> Faders X32 → Amp/PA (PRIMERO) → Rack de power → X32 (ÚLTIMA) → GoPros → URSA → ProPresenter → Confidence → TVs → LED → Mac → PC ATEM → Rack video → Humo → Lightkey</div>`,
};

function buildPanes(){
  Object.entries(RUBROS).forEach(([tid,rubros])=>{
    const pane=document.getElementById(tid);
    let html=BANNERS[tid]||'';
    rubros.forEach(rb=>{
      const items=allItemsInRubro(rb);
      const d=items.filter(i=>checkedData[i.id]).length;
      const pct=items.length?Math.round(d/items.length*100):0;
      html+=`<div class="rubro-btn" id="rb-${rb.id}">
        <div class="rubro-head" onclick="toggleRubro('${rb.id}')">
          <div class="rubro-icon ${rb.color}">${rb.icon}</div>
          <div class="rubro-info">
            <div class="rubro-top">
              <span class="rubro-name">${rb.label}</span>
              <span class="rubro-count" id="rc-${rb.id}">${d}/${items.length}</span>
            </div>
            <div class="rubro-track">
              <div class="rubro-fill ${rb.color}" id="rf-${rb.id}" style="width:${pct}%"></div>
            </div>
          </div>
          <span class="rubro-arrow">▾</span>
        </div>
        <div class="rubro-body">`;

      rb.phases.forEach(ph=>{
        const stepTag=ph.step?`<span class="ph-step-tag">Paso ${ph.step}</span>`:'';
        html+=`<div class="phase-group">
          <div class="ph-label">${stepTag}${ph.title}</div>`;
        ph.items.forEach(it=>{
          const data=checkedData[it.id];
          const ck=data?'ck':'';
          const eq=it.eq?`<span class="etag">${it.eq}</span>`:'';
          const whoText=data?`${data.icon} ${data.by}`:'';
          html+=`<div class="item ${ck}" id="i-${it.id}" onclick="toggle('${it.id}')">
            <div class="checkbox"><span class="checkmark">✓</span></div>
            <div class="itext">
              <div class="ilabel">${it.l}</div>
              ${it.s?`<div class="isub">${it.s}</div>`:''}
              <div class="itags"><span class="rtag ${RT[it.r]}">${RL[it.r]}</span>${eq}</div>
              <div class="who-tag">${whoText}</div>
            </div>
          </div>`;
        });
        html+=`</div>`;
      });
      html+=`</div></div>`;
    });
    pane.innerHTML=html;
  });
}
